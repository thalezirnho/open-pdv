<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cardápio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">Gerenciador de Cardápio</span>
        <a href="index.html" class="btn btn-outline-light btn-sm">Ver Kanban de Pedidos</a>
    </div>
</nav>

<div class="container-fluid px-4 mb-5">
    <div class="row g-4">
        <div class="col-md-3">
            <div class="card shadow-sm p-4 mb-4">
                <h5>Nova Categoria</h5>
                <form id="formCategoria" onsubmit="salvarCategoria(event)">
                    <div class="mb-3">
                        <input type="text" id="catNome" class="form-control" placeholder="Ex: Bebidas" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Adicionar Categoria</button>
                </form>
            </div>
            
            <div class="card shadow-sm p-4">
                <h5>Categorias Cadastradas</h5>
                <ul class="list-group" id="listaCategorias"></ul>
            </div>
        </div>

        <div class="col-md-9">
            <div class="card shadow-sm p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5>Produtos do Cardápio</h5>
                    <button class="btn btn-success btn-sm" onclick="abrirModalProduto()">+ Novo Produto</button>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>Foto</th>
                                <th>ID</th>
                                <th>Nome</th>
                                <th>Preço</th>
                                <th>Status (Clique p/ alterar)</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaProdutos"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalProduto" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitulo">Produto</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formProduto" onsubmit="salvarProduto(event)">
                    <input type="hidden" id="prodId">
                    
                    <div class="mb-3">
                        <label class="form-label">Nome do Produto</label>
                        <input type="text" id="prodNome" class="form-control" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Descrição</label>
                        <textarea id="prodDescricao" class="form-control" rows="2"></textarea>
                    </div>
                    
                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <label class="form-label">Preço (R$)</label>
                            <input type="number" id="prodPreco" step="0.01" class="form-control" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label">Categoria</label>
                            <select id="prodCategoria" class="form-select" required></select>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Foto do Produto (Opcional)</label>
                        <input type="file" id="prodImagem" class="form-control" accept="image/*">
                    </div>

                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="prodDisponivel" checked>
                        <label class="form-check-label">Disponível no menu</label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100">Salvar Produto</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = "http://127.0.0.1:8000/api";
    const BASE_URL = "http://127.0.0.1:8000"; 
    
    let modalElement;
    let listaDeCategoriasGlobais = [];

    window.onload = async () => {
        modalElement = new bootstrap.Modal(document.getElementById('modalProduto'));
        await atualizarDados();
    };

    async function atualizarDados() {
        await carregarCategorias();
        await carregarProdutos();
    }

    // --- LÓGICA DE CATEGORIAS ---
    async function carregarCategorias() {
        const res = await fetch(`${API_URL}/categorias`);
        listaDeCategoriasGlobais = await res.json();
        
        const lista = document.getElementById('listaCategorias');
        const select = document.getElementById('prodCategoria');
        
        lista.innerHTML = '';
        select.innerHTML = '<option value="">Selecione...</option>';

        listaDeCategoriasGlobais.forEach(cat => {
            lista.innerHTML += `<li class="list-group-item d-flex justify-content-between align-items-center">${cat.nome}<span class="badge bg-secondary">ID: ${cat.id}</span></li>`;
            select.innerHTML += `<option value="${cat.id}">${cat.nome}</option>`;
        });
    }

    async function salvarCategoria(e) {
        e.preventDefault();
        const nome = document.getElementById('catNome').value;
        await fetch(`${API_URL}/categorias`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ nome })
        });
        document.getElementById('catNome').value = '';
        await atualizarDados();
    }

    // --- LÓGICA DE PRODUTOS ---
    async function carregarProdutos() {
        const res = await fetch(`${API_URL}/produtos`);
        const produtos = await res.json();
        const tabela = document.getElementById('tabelaProdutos');
        tabela.innerHTML = '';

        produtos.forEach(p => {
            const imagemHtml = p.imagem_url 
                ? `<img src="${BASE_URL}${p.imagem_url}" class="rounded shadow-sm" style="width: 50px; height: 50px; object-fit: cover;">` 
                : `<div class="bg-secondary rounded" style="width: 50px; height: 50px;"></div>`;

            tabela.innerHTML += `
                <tr>
                    <td>${imagemHtml}</td>
                    <td>#${p.id}</td>
                    <td><strong>${p.nome}</strong><br><small class="text-muted">${p.descricao || ''}</small></td>
                    <td>R$ ${p.preco.toFixed(2)}</td>
                    <td>
                        <span class="badge ${p.disponivel ? 'bg-success' : 'bg-danger'}" 
                              style="cursor: pointer; user-select: none;" 
                              title="Clique para alternar o status instantaneamente"
                              onclick="alternarStatus(${p.id})">
                            ${p.disponivel ? 'Ativo' : 'Pausado'}
                        </span>
                    </td>
                    <td>
                        <button class="btn btn-sm btn-outline-secondary" onclick="abrirModalProduto(${p.id})">Editar</button>
                    </td>
                </tr>
            `;
        });
    }

    // Função rápida para alternar disponibilidade sem abrir modal
    async function alternarStatus(produtoId) {
        try {
            const res = await fetch(`${API_URL}/produtos/${produtoId}/toggle`, {
                method: 'PATCH'
            });
            if (res.ok) {
                await carregarProdutos(); // Atualiza apenas a tabela de produtos
            } else {
                alert("Erro ao alternar o status do produto no servidor.");
            }
        } catch (error) {
            console.error("Erro na requisição PATCH:", error);
        }
    }

    function abrirModalProduto(produtoId = null) {
        document.getElementById('formProduto').reset();
        if (produtoId) {
            document.getElementById('modalTitulo').innerText = "Editar Produto";
            document.getElementById('prodId').value = produtoId;
            alert("Atenção: A edição de produtos com foto via FormData exige que preencha os dados novamente nesta versão simples.");
        } else {
            document.getElementById('modalTitulo').innerText = "Novo Produto";
            document.getElementById('prodId').value = '';
        }
        modalElement.show();
    }

    async function salvarProduto(e) {
        e.preventDefault();
        const id = document.getElementById('prodId').value;
        const formData = new FormData();
        
        formData.append("nome", document.getElementById('prodNome').value);
        formData.append("descricao", document.getElementById('prodDescricao').value);
        formData.append("preco", document.getElementById('prodPreco').value);
        formData.append("categoria_id", document.getElementById('prodCategoria').value);
        formData.append("disponivel", document.getElementById('prodDisponivel').checked);
        
        const inputImagem = document.getElementById('prodImagem');
        if (inputImagem.files[0]) {
            formData.append("imagem", inputImagem.files[0]);
        }

        const url = id ? `${API_URL}/produtos/${id}` : `${API_URL}/produtos`;
        const method = id ? 'PUT' : 'POST';

        try {
            await fetch(url, { method: method, body: formData });
            modalElement.hide();
            await carregarProdutos();
        } catch (error) {
            console.error("Erro ao salvar produto:", error);
            alert("Erro ao salvar o produto.");
        }
    }
</script>
