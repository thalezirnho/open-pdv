services:
  backend:
    build: ./backend
    container_name: restaurante_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app  # Sincroniza o código da sua máquina com o container para o --reload funcionar
      - ./backend/static:/app/static
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/restaurante_db
      - REDIS_URL=redis://redis:6379/0
      - TZ=America/Sao_Paulo
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    container_name: restaurante_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: restaurante_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d restaurante_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: restaurante_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data: